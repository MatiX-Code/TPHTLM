<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body >

<header class="pb-5 mb-5 d-flex justify-content-around shadow py-5 mb-5 bg-body rounded ">
    <a class="navbar-brand fw-bold fs-3 text-primary" href="tp-skillhub-index.html">
                <i class="bi bi-code-square me-2"></i>SkillHub
    </a>
   
    <nav class="nav nav-pills">
        <a class=" nav-link link-dark fw-bold" href="#">Cours</a>
        <a class="nav-link link-dark" href="#">Tarifs</a>
        <a class=" nav-link link-dark" href="#">Contact</a>
    </nav>
    <button type="button" class="btn btn-outline-primary">Connexion</button>
</header>

<main class="col-3 shadow py-5 bg-body rounded m-auto w-25" >
            <h1 class="text-center display-6 fw-bold">Connexion</h1>
            <h6 class="text-center text-muted m">Ravis de vous revoir !</h6>
        <form class="needs-validation justify-content-center align-items-center" novalidate>
  <div class="m-4">
  <label for="email" class="form-label">Adresse Email</label>
  <input type="email" class="form-control is-invalid" id="email" placeholder="nom@exemple.com">
  <div class="invalid-feedback">
    Veuillez entrez une adresse email valide.
  </div>
</div>
     
  </div>
  <div class="m-4">
    <label for="exampleInputPassword1" class="form-label">Mot de passe</label>
  
<div class="input-group">
  <input type="password" class="form-control" id="passwordInput" placeholder="Mot de passe">
  <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
    <i class="bi bi-eye"></i>
  </span>
  </div>
</div>
  <div class="m-4 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label text-center" for="exampleCheck1" >Se souvenir de moi</label>
  </div>
  <div class="text-center">
  <button type="submit" class="btn btn-primary px-5 mb-3">Se connecter</button>
  </div>
  <h6 class="text-center text-muted">Pas encore de compte ? <a href="#" class="link-primary text-decoration-none">S'inscrire</a></h6>
</form>
    </main>

</body>
</html>
