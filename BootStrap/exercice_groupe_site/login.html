<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<header>

</header>
<body class="d-flex justify-content-center align-items-center p-5">
    <main class="card" style="width: 20rem" >
            <h1 class="text-center display-6 fw-bold">Connexion</h1>
            <h6 class="text-center text-muted">Ravis de vous revoir !</h6>
        <form class="needs-validation justify-content-center align-items-center" novalidate>
  <div class="m-4">
  <label for="email" class="form-label">Adresse Email</label>
  <input type="email" class="form-control is-invalid" id="email" placeholder="nom@exemple.com">
  <div class="invalid-feedback">
    Veuillez entrez une adresse email valide.
  </div>
</div>
     
  </div>
  <div class="m-4">
    <label for="exampleInputPassword1" class="form-label">Mot de passe</label>
  
<div class="input-group">
  <input type="password" class="form-control" id="passwordInput" placeholder="Mot de passe">
  <span class="input-group-text" id="togglePassword" style="cursor: pointer;">
    <i class="bi bi-eye"></i>
  </span>
  </div>
</div>
  <div class="m-4 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label text-center" for="exampleCheck1" >Se souvenir de moi</label>
  </div>
  <div class="text-center">
  <button type="submit" class="btn btn-primary px-5 mb-3">Se connecter</button>
  </div>
  <h6 class="text-center text-muted mb-5">Pas encore de compte ? <a href="#" class="link-primary">S'inscrire</a></h6>
</form>
    </main>

</body>
</html>
