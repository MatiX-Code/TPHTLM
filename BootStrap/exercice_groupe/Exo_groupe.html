<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercie Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    
    <header class="container-fluid bg-dark py-3 px-5 align-items-center">
        <p class="text-light fs-6 col-2 my-0">EcoWear</p>
    </header>
    
    <main class="container-fluid card border-0 text-center align-items-center px-5 mt-3">
        <p class="h1 mb-0">T-shirt coton bio</p>
        
        <p class="col-12 fs-6 mb-4">Produit simple et confortable.</p>
    
        <img class="car-img w-100 col-12" src="Capture d'écran 2026-07-13 142409.png"
            alt="T-shirt en coton bio su rune table">
    
        <div class="d-grid col-2 justify-content-center mx-auto py-3">
            <button type="button" class="btn btn-primary btn-sm">Acheter</button>
        </div>
    
        <div class="container-fluid text-center justify-content-center">
    
            <div class="row text-center my-5">
    
                <div class="col-4 border py-1">
                    <p class="my-0">Coton bio</p>
                </div>
                <div class="col-4 border py-1">
                    <p class="my-0">Confort</p>
                </div>
                <div class="col-4 border py-1">
                    <p class="my-0">Durable</p>
                </div>
    
            </div>
    
        </div>
    
        <h2>29€</h2>
    
        <div class="d-grid col-2 mx-auto py-0 justify-content-center">
            <button type="button" class="btn btn-white btn-sm border-dark btn-outline-dark">Commander</button>
        </div>
    
        <h2 class="mt-5">Contact</h2>
        <form class="col-6 text-start mb-5">
            <div class="mb-3">
                <label for="name" class="form-label">Nom</label>
                <input type="text" class="form-control py-1" id="name" aria-describedby="name">
            </div>
            <div class="mb-3">
                <label for="Email" class="form-label">Email</label>
                <input type="email" class="form-control py-1" id="Email">
            </div>
            <button type="submit" class="btn btn-sm btn-dark w-100 py-1">Envoyer</button>
        </form>
    
    </main>
    
    <footer class="container-fluid bg-dark py-3 px-5 justify-content-center text-center">
        <p class="text-light fs-6 col-12 my-0">EcoWear</p>
    </footer>

</body>
</html>
