<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exo2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h1>Connexion</h1>
        <div id="Info">
            <label for="Pseudo">Pseudo :</label>
            <input type="text"  name="Pseudo" id="Pseudo" placeholder="Mon Pseudo">
            <label for="Mot de passe">Mot de passe :</label>
            <input type="text" name="Mot de passe" id="Mot de passe" placeholder="Mon mot de passe">
        </div>
        <div id="Checkbox">
            <label for="Se souvenir de moi">Se souvenir de moi</label>
            <input type="checkbox" name="Se souvenir de moi" id="Se souvenir de moi">
        </div>
        <div id="Bouttons">
            <label for="Connexion"></label>
            <input type="submit" value="Connexion" id="Connexion">
            <label for="Retour"></label>
            <input type="reset" value="Retour" id="Retour">
        </div>
    </form> 
    
</body>
</html>
